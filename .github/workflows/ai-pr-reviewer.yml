name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-pr-reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify NVIDIA key and models
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          echo "Checking NVIDIA API authentication..."
          curl -f -i https://integrate.api.nvidia.com/v1/models \
            -H "Authorization: Bearer $NVIDIA_API_KEY"

      - name: Run AI PR reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: z-ai/glm4.7
          MAX_FILES: "20"
          MAX_PATCH_CHARS: "8000"
        run: |
          node src/index.js